run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable:
    - dupword

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow
  goimports:
    local-prefixes: github.com/kidandcat/ccc
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
