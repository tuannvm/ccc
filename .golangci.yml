# Golangci-lint configuration for CCC (Claude Command Center)

run:
  timeout: 5m
  modules-download-mode: readonly
  skip-dirs:
    - third_party
    - build
    - vendor

linters:
  disable:
    - dupword  # Too noisy for CLI help text
  enable:
    - gofmt
    - goimports
    - govet
    - gocyclo
    - misspell
    - staticcheck
    - unused
    - ineffassign
    - deadcode

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow
  goimports:
    local-prefixes: github.com/kidandcat/ccc
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
